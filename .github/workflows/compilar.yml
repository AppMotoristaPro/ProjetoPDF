name: Compilar Executavel Windows

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar Bibliotecas
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Blindagem Offline (Baixar Motor Visual)
      # Aqui está a mágica: Rodamos um script rápido que força o download do motor visual.
      # Assim que ele termina de baixar, o script se encerra sozinho com sucesso.
      run: |
        python -c "import flet as ft; import os; ft.app(target=lambda p: os._exit(0))"

    - name: Construir o Programa (.exe)
      # O PyInstaller agora vai achar o motor visual baixado no passo anterior
      # e vai "cozinhar" ele inteiro dentro de um arquivo único.
      run: |
        pyinstaller --noconsole --onefile --name "Holerite_Pro_DHL" main.py

    - name: Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: Holerite_DHL_Windows
        path: dist/

