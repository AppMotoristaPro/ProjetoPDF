name: Compilar Executavel Windows

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar Bibliotecas
      # Agora o pyinstaller será instalado SEMPRE, pois está no requirements.txt
      run: |
        pip install -r requirements.txt
        
    - name: Construir o Programa (.exe)
      # Retornamos ao pack oficial, sem frescuras
      run: |
        flet pack main.py
        
    - name: Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: Holerite_DHL_Windows
        path: dist/

