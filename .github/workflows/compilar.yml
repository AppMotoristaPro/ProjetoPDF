name: Compilar Executavel Windows

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar Bibliotecas
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Construir o Programa (.exe)
      # Aqui está o segredo: usamos o PyInstaller diretamente para criar o arquivo único
      run: |
        pyinstaller --noconsole --onefile --name "Holerite_Pro_DHL" main.py
        
    - name: Disponibilizar para Download
      uses: actions/upload-artifact@v4
      with:
        name: Holerite_DHL_Windows
        path: dist/

